name: Frontend Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          grep -q "<!DOCTYPE html>" index.html && echo "✅ HTML doctype found"
          grep -q "<head>" index.html && echo "✅ Head tag found"
          grep -q "<body>" index.html && echo "✅ Body tag found"
          grep -q "</html>" index.html && echo "✅ Closing html tag found"
      - name: Check assets
        run: |
          [ -f "assets/alipay_qrcode.jpg" ] && echo "✅ alipay_qrcode.jpg exists" || echo "❌ alipay_qrcode.jpg missing"
